<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Interactive Subtitles - Word Lookup</title>
    <link rel="stylesheet" href="../content/styles.css">
</head>

<body style="margin: 0; min-height: 100vh;">
    <div id="panel-content" class="interactive-sidebar-container dark-mode" style="width: 100%; height: 100vh; position: relative; border: none; box-shadow: none; border-radius: 0;">
        <div class="panel-empty" style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; border: none; box-shadow: none;">
            <div class="icon" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;">🎬</div>
            <p style="text-align: center; color: var(--lookup-muted, #9ca3af);">Select any text in articles or PDFs<br>to see its definition here.</p>
        </div>
    </div>

    <script type="module" src="./sidepanel.js"></script>
</body>

</html>
